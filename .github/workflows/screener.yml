name: Confluence Screener

on:
  schedule:
    # US Daylight Time: 9:30–16:00 ET == 13:30–20:00 UTC
    - cron: "*/15 13-20 * * 1-5"
    # US Standard Time: 9:30–16:00 ET == 14:30–21:00 UTC
    - cron: "*/15 14-21 * * 1-5"
  workflow_dispatch: {}

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      open: ${{ steps.gate.outputs.open }}
    steps:
      - name: Gate (NY hours + holiday-aware)
        id: gate
        run: |
          python - << 'PY'
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          import os, json, urllib.request
          now = datetime.now(ZoneInfo("America/New_York"))
          is_weekday = now.weekday() < 5
          in_hours = time(9,30) <= now.time() <= time(16,0)
          try:
              y = now.year
              url = f"https://raw.githubusercontent.com/trevorspray/nyse-holidays/main/{y}.json"
              data = json.loads(urllib.request.urlopen(url, timeout=5).read())
              holidays = set(data.get("holidays_local_dates", []))
              is_holiday = now.date().isoformat() in holidays
          except Exception:
              is_holiday = False
          open_now = is_weekday and in_hours and not is_holiday
          print("Market open:", open_now, "Holiday:", is_holiday, "NY:", now)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"open={'true' if open_now else 'false'}\n")
          PY

  run:
    needs: gate
    if: needs.gate.outputs.open == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: confluence-screener
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state
          key: state-v1-${{ runner.os }}
          restore-keys: |
            state-v1-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment
        run: |
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" >> $GITHUB_ENV
          echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}" >> $GITHUB_ENV
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> $GITHUB_ENV


      - name: Run screener
        run: python confluence_screener.py

      - name: Save state cache
        uses: actions/cache/save@v4
        with:
          path: state
          key: state-v1-${{ runner.os }}-${{ github.run_id }}
