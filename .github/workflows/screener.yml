name: Confluence Screener

on:
  schedule:
    # Every 20 minutes Mon–Fri (UTC). The job itself decides whether to run.
    - cron: "*/20 * * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: confluence-screener
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Kickoff marker
        shell: bash
        run: |
          echo "Run started: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"


      - name: Check if US market is open now (holiday-aware)
        id: market_open
        run: |
          python - << 'PY'
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          import os, json, urllib.request
          now = datetime.now(ZoneInfo("America/New_York"))
          is_weekday = now.weekday() < 5
          in_hours = time(9,30) <= now.time() <= time(16,0)
          try:
              y = now.year
              url = f"https://raw.githubusercontent.com/trevorspray/nyse-holidays/main/{y}.json"
              data = json.loads(urllib.request.urlopen(url, timeout=5).read())
              holidays = set(data.get("holidays_local_dates", []))
              is_holiday = now.date().isoformat() in holidays
          except Exception:
              is_holiday = False
          open_now = is_weekday and in_hours and not is_holiday
          print("Market open:", open_now, "Holiday:", is_holiday, "NY:", now)
          with open(os.environ['GITHUB_OUTPUT'],'a') as f:
              f.write(f"open={'true' if open_now else 'false'}\n")
          PY

      - name: Export secrets to env
        if: steps.market_open.outputs.open == 'true'
        run: |
          echo "FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}" >> $GITHUB_ENV
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" >> $GITHUB_ENV
          echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}" >> $GITHUB_ENV
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> $GITHUB_ENV
          echo "DATA_PROVIDER=finnhub" >> $GITHUB_ENV
          echo "SCAN_LIMIT=600" >> $GITHUB_ENV
          echo "DEBUG=1" >> $GITHUB_ENV

      - name: Restore state cache
        if: steps.market_open.outputs.open == 'true'
        uses: actions/cache/restore@v4
        with:
          path: state
          key: state-v1-${{ runner.os }}
          restore-keys: |
            state-v1-

      - name: Set up Python
        if: steps.market_open.outputs.open == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.market_open.outputs.open == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener
        if: steps.market_open.outputs.open == 'true'
        run: python confluence_screener.py

      - name: Save state cache
        if: steps.market_open.outputs.open == 'true'
        uses: actions/cache/save@v4
        with:
          path: state
          key: state-v1-${{ runner.os }}-${{ github.run_id }}
