# .github/workflows/screener.yml
name: Confluence Screener

on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"   # runs every 15m Mon–Fri 13:00–21:59 UTC
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: confluence-screener
      cancel-in-progress: true

    steps:
      - name: Check if US market is open now (NY time)
        id: market_open
        run: |
          python - << 'PY'
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          import os
          now_ny = datetime.now(ZoneInfo("America/New_York"))
          is_weekday = now_ny.weekday() < 5
          t = now_ny.time()
          open_now = is_weekday and (time(9,30) <= t <= time(16,0))
          print("Market open:", open_now, "NY time:", now_ny)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"open={'true' if open_now else 'false'}\n")
          PY

      - name: Abort early if market closed
        if: steps.market_open.outputs.open != 'true'
        run: echo "Market closed — skipping run."

      - name: Checkout
        if: steps.market_open.outputs.open == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.market_open.outputs.open == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.market_open.outputs.open == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env from GitHub Secrets
        if: steps.market_open.outputs.open == 'true'
        run: |
          {
            echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}"
            echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}"
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}"
          } > .env

      - name: Run screener
        if: steps.market_open.outputs.open == 'true'
        run: python confluence_screener.py
