name: Confluence Screener

on:
  schedule:
    # Every 5 minutes Mon–Fri — equity job checks market hours internally
    - cron: "*/5 * * * 1-5"
    # Every 15 minutes every day — crypto runs 24/7, no hours gate
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      report:
        description: "Send performance report without scanning ('1' = equity, 'crypto' = crypto)"
        required: false
        default: ""

concurrency:
  group: confluence-screener-${{ github.event_name }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # ── Equity screener ──────────────────────────────────────────────────────
  equity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.schedule == '*/5 * * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Kickoff marker
        run: |
          echo "Equity run started: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Check if US market is open (holiday-aware)
        id: market_open
        run: |
          python - << 'PY'
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          import os, json, urllib.request
          now = datetime.now(ZoneInfo("America/New_York"))
          is_weekday = now.weekday() < 5
          in_hours = time(9,30) <= now.time() <= time(16,0)
          try:
              url = f"https://raw.githubusercontent.com/trevorspray/nyse-holidays/main/{now.year}.json"
              data = json.loads(urllib.request.urlopen(url, timeout=5).read())
              is_holiday = now.date().isoformat() in set(data.get("holidays_local_dates", []))
          except Exception:
              is_holiday = False
          open_now = is_weekday and in_hours and not is_holiday
          print("Market open:", open_now, "Holiday:", is_holiday, "NY:", now)
          with open(os.environ['GITHUB_OUTPUT'],'a') as f:
              f.write(f"open={'true' if open_now else 'false'}\n")
          PY

      - name: Export secrets to env
        if: steps.market_open.outputs.open == 'true' || github.event.inputs.report != ''
        run: |
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" >> $GITHUB_ENV
          echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}" >> $GITHUB_ENV
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> $GITHUB_ENV
          echo "DATA_PROVIDER=alpaca" >> $GITHUB_ENV
          echo "SCAN_LIMIT=9999" >> $GITHUB_ENV
          echo "DEBUG=0" >> $GITHUB_ENV
          echo "CRYPTO_MODE=0" >> $GITHUB_ENV
          echo "REPORT=${{ github.event.inputs.report == '1' && '1' || '' }}" >> $GITHUB_ENV

      - name: Restore state cache
        if: steps.market_open.outputs.open == 'true' || github.event.inputs.report != ''
        uses: actions/cache/restore@v4
        with:
          path: state
          key: state-v1-${{ runner.os }}
          restore-keys: state-v1-

      - name: Set up Python
        if: steps.market_open.outputs.open == 'true' || github.event.inputs.report != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.market_open.outputs.open == 'true' || github.event.inputs.report != ''
        run: pip install -r requirements.txt

      - name: Run screener
        if: steps.market_open.outputs.open == 'true' || github.event.inputs.report != ''
        run: python confluence_screener.py

      - name: Save state cache
        if: steps.market_open.outputs.open == 'true'
        uses: actions/cache/save@v4
        with:
          path: state
          key: state-v1-${{ runner.os }}-${{ github.run_id }}

  # ── Crypto screener (24/7, no market hours gate) ─────────────────────────
  crypto:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Kickoff marker
        run: |
          echo "Crypto run started: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Export secrets to env
        run: |
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" >> $GITHUB_ENV
          echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}" >> $GITHUB_ENV
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> $GITHUB_ENV
          echo "DATA_PROVIDER=alpaca" >> $GITHUB_ENV
          echo "SCAN_LIMIT=9999" >> $GITHUB_ENV
          echo "DEBUG=0" >> $GITHUB_ENV
          echo "CRYPTO_MODE=1" >> $GITHUB_ENV
          echo "REPORT=${{ github.event.inputs.report == 'crypto' && '1' || '' }}" >> $GITHUB_ENV

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state
          key: state-v1-${{ runner.os }}
          restore-keys: state-v1-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python confluence_screener.py

      - name: Save state cache
        if: github.event.inputs.report == ''
        uses: actions/cache/save@v4
        with:
          path: state
          key: state-v1-${{ runner.os }}-${{ github.run_id }}
